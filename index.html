<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>조대봉의 한달계획</title>
  
  <!-- Cute Font: Jua -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/style.css?v=3.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Auth Overlay -->
  <div id="authOverlay" style="position:fixed; top:0; left:0; width:100%; height:100dvh; background:var(--theme-light-bg); z-index:9999; display:none; flex-direction:column; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.05); text-align:center;">
      <h2 style="font-family:'Jua', sans-serif; margin-bottom:20px; font-weight:700;">비밀번호 입력</h2>
      <input type="password" id="authInput" placeholder="••••" style="padding:10px; font-size:24px; font-weight:bold; width:150px; text-align:center; border:2px solid var(--border-color); border-radius:8px; margin-bottom:15px; letter-spacing:8px; outline:none;" />
      <br>
      <button id="authBtn" style="width:150px; padding:12px; background:var(--theme-primary); color:white; border:none; border-radius:8px; font-size:16px; font-weight:700; cursor:pointer;">확인</button>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1 class="header-title">
        <img src="profile.png" alt="Profile" class="header-profile" id="headerProfileImg">
        조대봉의 한달계획
      </h1>
      <div class="header-actions">
        <button class="icon-btn" id="searchToggleBtn">🔍</button>
      </div>
    </div>
    
    <!-- Month Navigation -->
    <div class="cal-header-row">
      <button class="cal-nav-btn" id="prevMonthBtn">&lt;</button>
      <label class="month-picker-label">
        <h2 class="cal-title" id="calTitle"></h2>
        <input type="month" id="monthPicker" class="hidden-month-picker">
      </label>
      <button class="cal-nav-btn" id="nextMonthBtn">&gt;</button>
    </div>

    <!-- Search Wrapper (Hidden by default) -->
    <div class="search-wrapper" id="searchWrapper">
      <div class="action-row">
        <input type="text" class="picker-input" id="searchInput" placeholder="할일 검색...">
        <button class="action-btn" id="searchBtn">찾기</button>
      </div>
      <!-- Search Results Area -->
      <div class="search-results" id="searchResultsList" style="display: none; padding: 10px 0;"></div>
    </div>
  </div>
  
  <!-- Full Calendar Main View -->
  <div class="full-calendar-container">
    <div class="cal-grid header">
      <div class="cal-day-label sunday">일</div>
      <div class="cal-day-label">월</div>
      <div class="cal-day-label">화</div>
      <div class="cal-day-label">수</div>
      <div class="cal-day-label">목</div>
      <div class="cal-day-label">금</div>
      <div class="cal-day-label saturday">토</div>
    </div>
    <div class="cal-grid body" id="calDaysGrid">
      <!-- Days will be dynamically injected here -->
    </div>
  </div>

  <!-- Day Detail Modal -->
  <div class="modal-overlay" id="dayModalOverlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalDateTitle"></h3>
        <button class="icon-btn close-btn" id="closeModalBtn">×</button>
      </div>
      
      <div class="modal-body">
        <!-- Daily Memo Section -->
        <div class="daily-memo-section">
          <textarea class="memo-area" id="modalMemoInput" placeholder="이 날의 메모를 입력하세요..."></textarea>
          <div class="memo-actions">
            <span class="save-status" id="memoStatus"></span>
            <button class="action-btn" id="saveMemoBtn">저장</button>
          </div>
        </div>

        <!-- Task List Section -->
        <div class="task-list-section">
          <h4>📝 상세 할일 목록</h4>
          <div class="task-list" id="modalTaskList">
            <!-- Tasks will be injected here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Fixed Input Bar -->
  <div class="bottom-fixed-bar" id="bottomFixedBar">
    <div class="fake-input">일정 추가</div>
  </div>

  <!-- FAB -->
  <button class="fab-btn" id="fabBtn">+</button>

  <!-- Bottom Sheet for Quick Add -->
  <div class="bottom-sheet-overlay" id="quickAddOverlay">
    <div class="bottom-sheet">
      <div class="sheet-header">
        <span id="quickAddDateLabel" class="sheet-date-label"></span>
        <button class="icon-btn close-btn" id="closeQuickAddBtn">×</button>
      </div>
      <div class="sheet-body">
        <input type="text" id="quickAddInput" placeholder="새로운 할일을 입력하세요..." class="input-description">
        <button id="quickAddSubmitBtn" class="btn-add">저장</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="./js/supabase.js"></script>
  <script src="./js/app.js?v=3.0"></script>
</body>
</html>
